name: pbregisteractivity

channels:
  - conda-forge

dependencies:
  - python=3.12
  - pyside6
  - matplotlib
  # Fonts (bundled in the PyInstaller binary via pbregisteractivity.spec)
  - fonts-conda-ecosystem   # meta-package: Ubuntu, DejaVu, Inconsolata, SourceCodePro
  - pyinstaller
  - ruff
  - pre-commit
  - pip
  - pip:
      - -e "."
